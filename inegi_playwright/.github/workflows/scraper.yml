name: Run RELPS Scraper Daily

on:
  schedule:
    - cron: "0 3 * * *" # Daily at 03:00 UTC
  workflow_dispatch:    # For manuel run
  push:
    branches:
      - main

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install

      - name: Run scraper
        run: |
          python scraper.py  

      - name: Update timestamp to force change
        run: |
          echo "Last update: $(date '+%Y-%m-%d %H:%M:%S')" >> relps_final.json

      - name: Force commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add relps_final.json
          git commit -m "Auto update $(date '+%Y-%m-%d %H:%M:%S')" || true
          git push


      - name: Send email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "🚨 Scraper FAILED - ${{ github.repository }}"
          to: yourmail@gmail.com
          from: GitHub Actions
          body: |
            Repository: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Run ID: ${{ github.run_id }}
            Check logs in GitHub Actions.

            
      - name: TEST MAIL (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "✅ TEST: INEGI Mail Alert Working"
          to: taner9321@email.com
          from: INEGI Test Bot
          body: |
            This is a TEST email.
            GitHub Actions mail integration is working correctly.